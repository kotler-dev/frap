name: fletta CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-core:
    name: Rust Core Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Check formatting
        run: cd crates && cargo fmt -- --check

      - name: Run Clippy
        run: cd crates && cargo clippy -- -D warnings

      - name: Run Rust tests
        run: cd crates && cargo test --workspace

  typescript-sdk:
    name: TypeScript SDK (WASM + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package.json

      - name: Install dependencies and build
        run: |
          cd sdk/typescript
          npm install
          npm run build
          test -f wasm/fletta_core.js
          test -f wasm/fletta_core_bg.wasm

  playwright-adapter:
    name: Playwright Adapter Build
    runs-on: ubuntu-latest
    needs: [typescript-sdk]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build SDK and adapter
        run: |
          cd sdk/typescript && npm install && npm run build
          cd ../../adapters/playwright && npm install && npm run build

  e2e-conference:
    name: E2E Conference (PoC CP001–CP005 gates)
    runs-on: ubuntu-latest
    needs: [rust-core, playwright-adapter]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build packages
        run: |
          cd sdk/typescript && npm install && npm run build
          cd ../../adapters/playwright && npm install && npm run build

      - name: Install Playwright browsers
        run: |
          cd e2e
          npm install
          npx playwright install chromium

      - name: Start test server
        run: |
          cd test-app
          node server.js &
          sleep 2
          curl -sf http://localhost:3000

      - name: Run Conference E2E
        run: |
          cd e2e
          npx playwright test --config=playwright.conference.config.ts
        env:
          FLETTA_TS_FALLBACK: 1

      - name: Verify CP005 report artifacts (CONF-RPT-RUN-PASS)
        run: node e2e/conference/verify-reports.mjs

      - name: Upload fletta reports (JUnit + JSON)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fletta-conference-reports
          path: |
            e2e/fletta-reports/conference/junit.xml
            e2e/fletta-reports/conference/fletta-report.json
            e2e/fletta-reports/conference/fletta-events.jsonl
            e2e/fletta-reports/conference/fletta-debug.html
          retention-days: 30

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: |
            e2e/test-results/
            e2e/conference-results.json
          retention-days: 14

  e2e-context:
    name: E2E Context Layer (C002–C004)
    runs-on: ubuntu-latest
    needs: [rust-core, playwright-adapter]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build packages
        run: |
          cd sdk/typescript && npm install && npm run build
          cd ../../adapters/playwright && npm install && npm run build

      - name: Install Playwright browsers
        run: |
          cd e2e
          npm install
          npx playwright install chromium

      - name: Start test server
        run: |
          cd test-app
          node server.js &
          sleep 2
          curl -sf http://localhost:3000

      - name: Run Context Layer E2E
        run: ./scripts/test.sh context
        env:
          FLETTA_TS_FALLBACK: 1

      - name: Upload context reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fletta-context-reports
          path: |
            e2e/fletta-reports/context/fletta-context.json
            e2e/fletta-reports/context/fletta-context-events.jsonl
            e2e/fletta-reports/context/fletta-rca.json
            e2e/fletta-reports/context/junit.xml
          retention-days: 30
