name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: frap-core-rpc-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: frap-core-rpc-linux-x86_64-musl
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: frap-core-rpc-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cd crates && cargo build --release -p frap-core --bin frap-core-rpc --target ${{ matrix.target }}
      - run: |
          mkdir -p sdk/java/frap-core-java/src/main/resources/META-INF/native
          cp crates/target/${{ matrix.target }}/release/frap-core-rpc \
             sdk/java/frap-core-java/src/main/resources/META-INF/native/${{ matrix.binary_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-binaries-${{ matrix.target }}
          path: sdk/java/frap-core-java/src/main/resources/META-INF/native/

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - uses: actions/download-artifact@v4
        with:
          pattern: native-binaries-*
          merge-multiple: true
          path: sdk/java/frap-core-java/src/main/resources/META-INF/native/
      - name: Make binaries executable
        run: chmod +x sdk/java/frap-core-java/src/main/resources/META-INF/native/*
      - name: Publish to Maven Central
        run: |
          cd sdk/java
          mvn -P release -pl frap-core-java,../../adapters/playwright-java \
            -Dgpg.passphrase="${GPG_PASSPHRASE}" \
            deploy --batch-mode
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
