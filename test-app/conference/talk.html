<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Доклад — FixtureConf</title>
  <link rel="stylesheet" href="conference.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">FixtureConf</a>
    <a href="schedule-v2.html">← Расписание</a>
  </header>
  <main class="container">
    <div class="panel">
      <h1 id="talk-title">Доклад</h1>
      <p id="talk-room" class="talk-meta">Зал 1</p>
      <p id="talk-desc">Описание доклада для demo.</p>
      <div id="toast"></div>
    </div>
  </main>
  <script>
    const talks = {
      opening: { title: 'Открытие конференции', room: 'Зал 1', desc: 'Приветствие и обзор программы.' },
      healing: { title: 'Self-healing в E2E', room: 'Зал 2', desc: 'Детерминированный healing и отчёты.' },
      agents: { title: 'Агенты в регрессе', room: 'Зал 3', desc: 'Агентные системы для мобильного регресса.' },
    };
    const id = new URLSearchParams(location.search).get('id') || 'opening';
    const t = talks[id] || talks.opening;
    document.getElementById('talk-title').textContent = t.title;
    document.getElementById('talk-room').textContent = t.room;
    document.getElementById('talk-desc').textContent = t.desc;
    const toast = document.getElementById('toast');
    toast.textContent = 'Доклад открыт: ' + id;
    toast.className = 'show';
  </script>
</body>
</html>
